name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  PROJECT_ID: lumen-490210
  REGION: europe-west2

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push backend image
        run: |
          gcloud auth configure-docker --quiet
          docker build -f backend/Dockerfile -t gcr.io/$PROJECT_ID/lumen-api .
          docker push gcr.io/$PROJECT_ID/lumen-api

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy lumen-api \
            --image gcr.io/$PROJECT_ID/lumen-api \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 1 \
            --timeout 300

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push frontend image
        run: |
          gcloud auth configure-docker --quiet
          docker build -t gcr.io/$PROJECT_ID/lumen-web frontend/
          docker push gcr.io/$PROJECT_ID/lumen-web

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy lumen-web \
            --image gcr.io/$PROJECT_ID/lumen-web \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars="BACKEND_URL=https://lumen-api-781072572686.$REGION.run.app" \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2
